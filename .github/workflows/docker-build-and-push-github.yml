name: Build and Push Docker Images

on:
    workflow_call:
        inputs:
            image-name:
                required: true
                type: string
            dockerfile:
                required: false
                type: string
                default: Dockerfile
            context:
                required: false
                type: string
                default: .
            tag:
                required: false
                type: string
                default: latest

permissions:
    contents: read
    packages: write

jobs:
    build-arm64:
        runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-24.04-arm' }}
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push ARM64 image with cache
              uses: docker/build-push-action@v4
              with:
                  context: ${{ inputs.context }}
                  file: ${{ inputs.dockerfile }}
                  platforms: linux/arm64
                  push: true
                  provenance: false
                  tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }}-arm64
                  cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}-cache:arm64
                  cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}-cache:arm64,mode=max

    build-amd64:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push AMD64 image with cache
              uses: docker/build-push-action@v4
              with:
                  context: ${{ inputs.context }}
                  file: ${{ inputs.dockerfile }}
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }}-amd64
                  cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}-cache:amd64
                  cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}-cache:amd64,mode=max

    create-manifest:
        needs: [build-arm64, build-amd64]
        runs-on: ubuntu-latest
        steps:
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create and push multi-arch manifest
              run: |
                  docker manifest create ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }} \
                    --amend ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }}-amd64 \
                    --amend ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }}-arm64
                  docker manifest push ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tag }}
